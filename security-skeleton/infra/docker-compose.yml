# infra/docker-compose.yml
# DB isolated in private network — no direct internet exposure

services:
  app:
    build: ..
    expose:
      - "3000"
    env_file: ../.env
    depends_on:
      - db
      - redis
      - vault
    volumes:
      - ./certs:/app/infra/certs:ro
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - app_net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./certs:/etc/ssl/logoracle-certs:ro
    # NO ports exposed to host — app_net only
    networks:
      - app_net
    command: >
      postgres
        -c ssl=on
        -c ssl_cert_file=/etc/ssl/logoracle-certs/server.crt
        -c ssl_key_file=/etc/ssl/logoracle-certs/server.key
        -c log_connections=on
        -c log_disconnections=on
        -c log_statement=all
        -c log_min_duration_statement=500

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASS}
    networks:
      - app_net

  vault:
    image: hashicorp/vault:1.16
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
    networks:
      - app_net

  backup-cron:
    image: postgres:16-alpine
    env_file: ../.env
    volumes:
      - ../scripts/backup.sh:/backup.sh:ro
      - ../backups:/backups
    entrypoint: >
      sh -c "
        apk add --no-cache bash &&
        while true; do
          BACKUP_DIR=/backups /backup.sh;
          echo 'Next backup in 24h';
          sleep 86400;
        done
      "
    depends_on:
      - db
    networks:
      - app_net
    restart: unless-stopped

networks:
  app_net:
    driver: bridge
    internal: false   # app can reach internet; DB cannot (no port binding)

volumes:
  db_data:
    driver: local
